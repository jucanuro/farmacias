<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Factura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
        }
    </style>
</head>
<body class="bg-[#1a1a2e] text-slate-200 p-8 flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-xl">
        <h1 class="text-3xl font-bold text-center text-slate-100 mb-6">Enviar Factura Electrónica</h1>

        <form id="invoice-form" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="invoice_number" class="block text-sm font-medium text-slate-400">Número de Factura</label>
                    <input type="text" id="invoice_number" name="invoice_number" value="INV-001" readonly
                           class="mt-1 block w-full rounded-md bg-slate-700 border-slate-600 focus:border-indigo-500 focus:ring-indigo-500 text-slate-200 shadow-sm p-3">
                </div>
                <div>
                    <label for="amount" class="block text-sm font-medium text-slate-400">Monto</label>
                    <input type="number" id="amount" name="amount" value="125.50" readonly
                           class="mt-1 block w-full rounded-md bg-slate-700 border-slate-600 focus:border-indigo-500 focus:ring-indigo-500 text-slate-200 shadow-sm p-3">
                </div>
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                Enviar Factura
            </button>
        </form>

        <div id="response-message" class="mt-6 text-center text-sm font-medium"></div>
    </div>

    <script>
        document.getElementById('invoice-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const csrfToken = form.querySelector('[name="csrfmiddlewaretoken"]').value;
            const responseMessage = document.getElementById('response-message');
            responseMessage.textContent = 'Enviando...';
            responseMessage.className = 'mt-6 text-center text-sm font-medium text-slate-400';

            const invoiceData = {
                invoice: {
                    invoice_number: form.invoice_number.value,
                    amount: parseFloat(form.amount.value)
                }
            };

            try {
                const response = await fetch('{% url "core:enviar_factura_electronica" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(invoiceData)
                });

                const result = await response.json();

                if (response.ok) {
                    responseMessage.textContent = `Éxito: ${result.message} (ID: ${result.invoice_id})`;
                    responseMessage.className = 'mt-6 text-center text-sm font-medium text-emerald-400';
                } else {
                    responseMessage.textContent = `Error: ${result.message || 'Error desconocido'}`;
                    responseMessage.className = 'mt-6 text-center text-sm font-medium text-red-400';
                }

            } catch (error) {
                responseMessage.textContent = `Error en la conexión: ${error.message}`;
                responseMessage.className = 'mt-6 text-center text-sm font-medium text-red-400';
            }
        });
    </script>
</body>
</html>
