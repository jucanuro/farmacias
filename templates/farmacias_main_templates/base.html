{% load static %}
<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VQL - Pharma Elite System{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'display': ['Sora', 'sans-serif'],
                    },
                    colors: {
                        pharma: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            cyan: '#06b6d4',
                        },
                        slate: {
                            850: '#1e293b',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Reset y refinamiento de scroll */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ocultar scrollbar pero permitir funcionalidad */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Contenedor de fondo dinámico */
        .vql-background-wrapper {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f8fafc 100%);
            overflow: hidden;
            pointer-events: none;
        }

        /* Elementos flotantes minimalistas */
        .shape {
            position: absolute;
            filter: blur(0.5px);
            opacity: 0.3;
            animation: float 25s infinite ease-in-out;
            will-change: transform;
        }

        .capsule {
            width: 30px;
            height: 75px;
            border-radius: 50px;
            background: linear-gradient(180deg, #10b981 50%, #f1f5f9 50%);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.1);
        }

        .pill-round {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.02), 4px 8px 15px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pill-round::after {
            content: '';
            width: 80%;
            height: 1px;
            background: #f1f5f9;
            transform: rotate(45deg);
        }

        .bottle {
            width: 40px;
            height: 70px;
            background: rgba(6, 182, 212, 0.08);
            border: 1.5px solid rgba(6, 182, 212, 0.15);
            border-radius: 6px 6px 12px 12px;
        }

        /* Animaciones suaves */
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(10deg); }
            66% { transform: translate(-20px, 30px) rotate(-8deg); }
        }

        /* Orbes de luz para Profundidad */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -2;
            opacity: 0.35;
        }

        /* Clases de utilidad para transiciones de carga */
        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>

<body class="font-sans antialiased text-slate-900">

    <div class="vql-background-wrapper">
        <div class="shape capsule" style="top: 15%; left: 5%; transform: rotate(25deg);"></div>
        <div class="shape pill-round" style="top: 22%; left: 12%; animation-delay: -3s;"></div>
        
        <div class="shape bottle" style="top: 10%; right: 10%; transform: rotate(-15deg); animation-delay: -7s;"></div>
        <div class="shape capsule" style="bottom: 20%; left: 8%; transform: rotate(-30deg); scale: 0.8;"></div>

        <div class="shape pill-round" style="bottom: 15%; right: 12%; animation-delay: -5s; opacity: 0.2;"></div>
        <div class="shape bottle" style="bottom: 10%; right: 45%; scale: 0.6; opacity: 0.1;"></div>

        <div class="glow-orb bg-emerald-100 w-[600px] h-[600px] -top-40 -left-40"></div>
        <div class="glow-orb bg-cyan-100 w-[500px] h-[500px] -bottom-20 -right-20"></div>
        <div class="glow-orb bg-blue-50 w-[400px] h-[400px] top-1/2 left-1/3 opacity-20"></div>
    </div>

    <div class="relative min-h-screen z-10 page-transition">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Efecto sutil al mover el mouse en los elementos de fondo (Parallax suave)
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelectorAll('.shape').forEach(shape => {
                shape.style.transform += ` translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
    {% block scripts_extra %}{% endblock %}
</body>

</html>
