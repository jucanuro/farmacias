{% if estado == "PENDIENTE" %}
    <span class="inline-flex rounded-xl border border-amber-200 bg-amber-50 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-amber-700">Pendiente</span>
{% elif estado == "ENVIADO" %}
    <span class="inline-flex rounded-xl border border-sky-200 bg-sky-50 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-sky-700">Enviado</span>
{% elif estado == "RECIBIDO" %}
    <span class="inline-flex rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-emerald-700">Recibido</span>
{% elif estado == "CANCELADO" %}
    <span class="inline-flex rounded-xl border border-slate-200 bg-slate-100 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-slate-600">Cancelado</span>
{% elif estado == "RECHAZADO" %}
    <span class="inline-flex rounded-xl border border-rose-200 bg-rose-50 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-rose-700">Rechazado</span>
{% else %}
    <span class="inline-flex rounded-xl border border-slate-200 bg-white px-3 py-1 text-[10px] font-black uppercase tracking-widest text-slate-600">{{ estado }}</span>
{% endif %}
